<body>
    <script>
        let myFriends = ["Osama", "Ahmed", "Sayed", "Sayed", "Mahmoud", "Osama"];

        let uniqueFriends = [];

        for (let i = 0; i < myFriends.length; i++) {
            if (!uniqueFriends.includes(myFriends[i])) {
                uniqueFriends.push(myFriends[i]);
            }
        }

        uniqueFriends.sort();

        console.log(uniqueFriends);
    </script>
</body>
