<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

</head>

<body>
    <script>
        let myInfo = {
            username: "Osama",
            role: "Admin",
            country: "Egypt",
        };

        // تحويل Object إلى Map
        let myMap = new Map(Object.entries(myInfo));

        // طباعة الـ Map
        console.log(myMap);

        // عدد العناصر
        console.log(myMap.size);

        // هل يوجد عنصر اسمه role؟
        console.log(myMap.has("role"));
    </script>
</body>

</html>
