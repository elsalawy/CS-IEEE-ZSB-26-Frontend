<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2</title>
    <script>

        // Method One (Object Literal)
        let objMethodOne = {
            property: "Method One"
        };
        console.log(objMethodOne.property);


        // Method Two (Using new Object)
        let objMethodTwo = new Object();
        objMethodTwo.property = "Method Two";
        console.log(objMethodTwo.property);


        // Method Three (Using Object.create)
        let objMethodThree = Object.create({});
        objMethodThree.property = "Method Three";
        console.log(objMethodThree.property);


        // Method Four (Using Object.assign)
        let objMethodFour = Object.assign({}, { property: "Method Four" });
        console.log(objMethodFour.property);

    </script>
</head>

<body>

</body>

</html>
