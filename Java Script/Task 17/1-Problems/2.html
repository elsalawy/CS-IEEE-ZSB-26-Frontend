    <title>2</title>
    <script>

        function AddUP(num) {
            let sum = 0;
            for (let i = 0; i <= num; i++) {
                sum += i;
            }
            return sum;
        }

        console.log(AddUP(4));
        console.log(AddUP(13));
        console.log(AddUP(600));


    </script>
