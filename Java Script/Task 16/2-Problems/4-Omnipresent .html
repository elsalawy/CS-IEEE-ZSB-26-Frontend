<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omnipresent </title>
    <script>
        function Omni(arr, value) {
            for (let i = 0; i < arr.length; i++) {
                if (!arr[i].includes(value)) {
                    return false;
                }
            }
            return true;
        }
        console.log(Omni([[1, 1], [1, 3], [5, 1], [6, 1]], 1)); // true
        console.log(Omni([[1, 1], [1, 3], [5, 1], [6, 1]], 6)); // false
        console.log(Omni([[5], [5], [5], [6, 5]], 5));          // true
        console.log(Omni([[5], [5], [5], [6, 5]], 6));          // false
    </script>
</head>

<body>

</body>

</html>
