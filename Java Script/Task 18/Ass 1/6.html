<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Form Elements</title>

    <style>
        .results {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .box {
            background: #f2f2f2;
            padding: 10px;
            width: 120px;
            text-align: center;
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <form action="">
        <input type="number" name="elements" class="input" placeholder="Number Of Elements" />
        <input type="text" name="texts" class="input" placeholder="Elements Text" />
        <select name="type" class="input">
            <option value="Div">Div</option>
            <option value="Section">Section</option>
        </select>
        <input type="submit" name="create" value="Create" />
        <div class="results"></div>
    </form>

    <script>
        let form = document.forms[0];
        let elements = document.querySelector("[name='elements']");
        let text = document.querySelector("[name='texts']");
        let type = document.querySelector("[name='type']");
        let results = document.querySelector(".results");

        form.onsubmit = function (e) {
            e.preventDefault();

            results.innerHTML = "";

            for (let i = 1; i <= elements.value; i++) {
                let box = document.createElement(type.value);

                box.className = "box";
                box.title = "Element";
                box.id = `id-${i}`;
                box.textContent = text.value;

                results.appendChild(box);
            }
        };
    </script>

</body>

</html>
