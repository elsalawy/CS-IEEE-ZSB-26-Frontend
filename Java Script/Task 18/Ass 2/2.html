<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn JavaScript</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .assign {
            text-align: center;
            padding-top: 20px;
        }

        .assign input {
            padding: 10px;
            width: 300px;
            border: 1px solid #ddd;
        }

        .assign input:focus {
            outline: none;
            border-color: #ccc;
        }

        .assign [title="Current"] {
            padding: 20px;
            margin: 10px auto;
            width: 610px;
            background-color: #f1f0f0;
        }

        .assign .classes-list {
            padding: 20px;
            margin: 10px auto;
            width: 610px;
            background-color: #f1f0f0;
        }

        .assign .classes-list h5 {
            margin: 0 0 10px;
            text-align: left;
        }

        .assign .classes-list div span {
            background-color: #ff5722;
            padding: 6px 10px 8px;
            margin-right: 5px;
            border-radius: 6px;
            color: white;
            display: inline-flex;
        }
    </style>
</head>

<body>
    <div class="assign">
        <input type="text" class="classes-to-add" placeholder="Add Classes" />
        <input type="text" class="classes-to-remove" placeholder="Remove Classes" />
        <div class="element current" title="Current">Current Element</div>
        <div class="classes-list">
            <h5>Current Element Class Lists</h5>
            <div></div>
        </div>
    </div>
</body>
<script>
    let addInput = document.querySelector(".classes-to-add");
    let removeInput = document.querySelector(".classes-to-remove");
    let currentElement = document.querySelector(".current");
    let resultDiv = document.querySelector(".classes-list div");

    // Function لعرض الكلاسات
    function showClasses() {
        resultDiv.innerHTML = "";

        let classes = Array.from(currentElement.classList);

        if (classes.length === 0) {
            resultDiv.innerHTML = "No Classes To Show";
            return;
        }

        classes.sort();

        classes.forEach(cls => {
            let span = document.createElement("span");
            span.textContent = cls;
            resultDiv.appendChild(span);
        });
    }

    // إضافة Classes
    addInput.onblur = function () {
        if (this.value.trim() !== "") {
            let classes = this.value.toLowerCase().split(" ");

            classes.forEach(cls => {
                if (cls !== "") {
                    currentElement.classList.add(cls);
                }
            });
        }

        this.value = "";
        showClasses();
    };

    removeInput.onblur = function () {
        if (this.value.trim() !== "") {
            let classes = this.value.toLowerCase().split(" ");

            classes.forEach(cls => {
                if (cls !== "") {
                    currentElement.classList.remove(cls);
                }
            });
        }

        this.value = "";
        showClasses();
    };

    showClasses();
</script>

</html>
