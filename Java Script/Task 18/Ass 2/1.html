<body>
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8" />
        <title>Learn JavaScript</title>
        <script>
            window.onload = function () {
                let elements = document.querySelectorAll(".open");

                for (let i = 0; i < elements.length; i++) {
                    if (
                        elements[i].classList.contains("open") &&
                        elements[i].textContent.trim() === "Elzero"
                    ) {
                        window.open(elements[i].href, "_blank");
                    }
                }
            };
        </script>
    </head>

    <body>
        <a class="open" href="https://google.com">Google</a>
        <a class="open" href="https://elzero.org">Elzero</a>
        <a class="not" href="https://facebook.com">Facebook</a>
        <a class="linked" href="https://linkedin.com">Elzero</a>
        <script src="main.js"></script>
    </body>

    </html>
</body>

</html>
