<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operators </title>
    <script>
        console.log(100 == "100"); // true
        console.log(100 != 1000); // true
        console.log((110 && 100 && 10 && 20) == 20); // true
        console.log((-10 && "-10") == "-10"); // true

        console.log((-50 && +"-40") == -40); // true
        console.log((10 && -"-40") == 40); // true
        console.log(("10" && 10) == 10); // true
        console.log((20 || false) == 20); // true
    </script>
</head>

<body>

</body>

</html>
