<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1</title>
</head>

<body>
    <script>
        let promptMsg = prompt("Print Number From - To -", "Example: 5-20");
        let arr = promptMsg.split("-");
        let num1 = arr[0];
        let num2 = arr[1];
        if (num1 < num2) {
            for (let i = num1; i <= num2; i++)
                console.log(i);
        }
        else {
            for (let i = num2; i <= num1; i++)
                console.log(i);
        }
    </script>
</body>

</html>
