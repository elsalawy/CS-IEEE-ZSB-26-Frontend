<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Font Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Cairo&family=Roboto&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            font-size: 16px;
            color: black;
            text-align: center;
            margin-top: 50px;
        }

        select {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h2>Customize Text Style</h2>

    <!-- Select Boxes -->
    <select id="fontSelect">
        <option value="Open Sans">Open</option>
        <option value="Cairo">Cairo</option>
        <option value="Roboto">Roboto</option>
    </select>

    <select id="colorSelect">
        <option value="black">Black</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="purple">Purple</option>
        <option value="orange">Orange</option>
    </select>

    <select id="sizeSelect"></select>

    <p id="text">This is a sample text to preview your choices.</p>

    <script>
        const fontSelect = document.getElementById("fontSelect");
        const colorSelect = document.getElementById("colorSelect");
        const sizeSelect = document.getElementById("sizeSelect");
        const text = document.getElementById("text");

        // Fill size select (16 → 30)
        for (let i = 16; i <= 30; i++) {
            let option = document.createElement("option");
            option.value = i;
            option.textContent = i;
            sizeSelect.appendChild(option);
        }

        // Load from Local Storage
        function loadSettings() {
            let font = localStorage.getItem("font");
            let color = localStorage.getItem("color");
            let size = localStorage.getItem("size");

            if (font) {
                fontSelect.value = font;
                document.body.style.fontFamily = font;
            }

            if (color) {
                colorSelect.value = color;
                document.body.style.color = color;
            }

            if (size) {
                sizeSelect.value = size;
                document.body.style.fontSize = size + "px";
            }
        }

        // Save & Apply
        function applySettings() {
            let font = fontSelect.value;
            let color = colorSelect.value;
            let size = sizeSelect.value;

            document.body.style.fontFamily = font;
            document.body.style.color = color;
            document.body.style.fontSize = size + "px";

            localStorage.setItem("font", font);
            localStorage.setItem("color", color);
            localStorage.setItem("size", size);
        }

        // Events
        fontSelect.addEventListener("change", applySettings);
        colorSelect.addEventListener("change", applySettings);
        sizeSelect.addEventListener("change", applySettings);

        // First load
        loadSettings();
    </script>

</body>

</html>
