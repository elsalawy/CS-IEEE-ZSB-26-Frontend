<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8</title>
    <script>
        let text = ' hello JavaScript ';

        // Remove spaces from start and end
        let trimmedText = text.trim();
        console.log("After trim:", trimmedText); // "hello JavaScript"

        // Convert to uppercase
        let upperText = trimmedText.toUpperCase();
        console.log("Uppercase:", upperText); // "HELLO JAVASCRIPT"

        // Print length after trimming
        console.log("Length after trim:", trimmedText.length); // 16
    </script>
</head>

<body>

</body>

</html>
