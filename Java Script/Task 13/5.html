<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5</title>
    <script>
        let num = 4.7;

        // Normal rounding
        let roundNormal = Math.round(num);
        console.log("Normal rounding:", roundNormal); // 5

        //  round down
        let roundDown = Math.floor(num);
        console.log("Always round down:", roundDown); // 4

        //  round up
        let roundUp = Math.ceil(num);
        console.log("Always round up:", roundUp); // 5
    </script>
</head>

<body>

</body>

</html>
