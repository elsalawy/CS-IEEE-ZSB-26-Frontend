<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9</title>
    <script>
        let sentence = 'I love JavaScript and JavaScript is amazing';

        // First index of 'JavaScript'
        let firstIndex = sentence.indexOf('JavaScript');
        console.log("First index of 'JavaScript':", firstIndex); // 7

        // Last index of 'JavaScript'
        let lastIndex = sentence.lastIndexOf('JavaScript');
        console.log("Last index of 'JavaScript':", lastIndex); // 22
    </script>
