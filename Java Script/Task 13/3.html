<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3</title>
    <script>
        let points = 10;

        // Increase by 1
        points++;
        console.log("After increment (++):", points);

        // Decrease by 1
        points--;
        console.log("After decrement (--):", points);

        // Multiply by 3
        points *= 3;
        console.log("After multiply (*= 3):", points);
    </script>
</head>

</html>
