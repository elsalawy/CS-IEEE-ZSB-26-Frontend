<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average</title>
    <script>
        let arr = [1, 3, 9, 15, 90];
        let sum = 0;
        for (let i = 0; i < arr.length; i++) {
            sum += arr[i];
        }
        if (arr.length > 0) {
            console.log(sum / arr.length);
        }

    </script>
</head>
