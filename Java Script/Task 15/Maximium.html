    <title>Maximium</title>
    <script>
        let arr = [1, 3, 9, 15, 90, 27, 64];
        let max;
        if (arr.length > 0) {
            max = arr[0];
        }
        for (let i = 0; i < arr.length; i++) {
            if (arr[i] > max) {
                max = arr[i];
            }
        }
        console.log(max);
    </script>
