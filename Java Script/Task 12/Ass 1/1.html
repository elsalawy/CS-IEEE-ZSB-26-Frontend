<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Learn JavaScript</title>
    <script>
        // Code One
        document.getElementById("el").style.color = "red";   // Cannot read properties of null
    </script>
    <script>
        // Code Two
        window.onload = function () {
            document.getElementById("el").style.color = "red";   // yes window.onload
        };
    </script>
</head>

<body>
    <h1 id="el">Page Title</h1>
    <script>
        // Code Three
        document.getElementById("el").style.color = "red";   //yes script after code
    </script>
</body>

</html>
