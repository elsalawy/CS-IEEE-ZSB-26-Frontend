<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Arrow</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        div {
            width: 300px;
            height: 30px;
            padding: 15px;
            margin-bottom: 20px;
            background: #eee;
            display: flex;
            align-items: center;
            position: relative;
        }

        .arrow.top::before {
            content: "";
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            border: 18px solid transparent;
            border-bottom-color: #eee;
        }

        .arrow.right::before {
            content: "";
            position: absolute;
            right: -35px;
            top: 50%;
            transform: translateY(-50%);
            border: 18px solid transparent;
            border-left-color: #eee;
        }

        .arrow.bottom::before {
            content: "";
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            border: 18px solid transparent;
            border-top-color: #eee;
        }

        .arrow.left::before {
            content: "";
            position: absolute;
            left: -35px;
            top: 50%;
            transform: translateY(-50%);
            border: 18px solid transparent;
            border-right-color: #eee;
        }
    </style>
</head>

<body>

    <div class="arrow top">Elzero</div>
    <div class="arrow right">Elzero</div>
    <div class="arrow bottom">Elzero</div>
    <div class="arrow left">Elzero</div>

</body>

</html>
