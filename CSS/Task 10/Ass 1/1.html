<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Rotate</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        div {
            width: 100px;
            height: 100px;
            border: 10px solid rgb(201, 33, 111);
            border-radius: 50%;
            border-top-color: transparent;
            position: relative;
            transform: rotate(45deg);
            animation: spin1 2s linear infinite;
        }

        div::before {
            content: "";
            width: 130px;
            height: 130px;
            border: 10px solid rgb(10, 79, 182);
            border-radius: 50%;
            border-bottom-color: transparent;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin1 4s linear infinite;
        }

        div::after {
            content: "";
            width: 160px;
            height: 160px;
            border: 10px solid rgb(182, 93, 10);
            border-radius: 50%;
            border-left-color: transparent;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin1 6s linear infinite;
        }

        @keyframes spin1 {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes spin2 {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        @keyframes spin3 {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        div:hover,
        div:hover::before,
        div:hover::after {
            animation-play-state: paused;
        }
    </style>
</head>

<body>
    <div></div>
</body>

</html>
