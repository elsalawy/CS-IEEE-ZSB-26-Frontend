<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Spin</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        div {
            width: 100px;
            height: 100px;
            background-color: #EEE;
            border: 10px solid black;
            border-radius: 50%;
            border-right-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 3s linear infinite forwards reverse;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(720deg);
            }
        }
    </style>
</head>

<body>
    <div></div>
</body>

</html>
