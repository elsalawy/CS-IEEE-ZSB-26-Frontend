    <title>Selectors 3</title>
    <style>
        .parent .baby:only-child {
            color: red;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="baby">Testing</div>
        <div class="baby">Testing</div>
    </div>
    <div class="parent">
        <div class="baby">Elzero</div>
    </div>
    <div class="parent">
        <div>
            <div>Testing</div>
        </div>
        <div class="baby">Testing</div>
    </div>
    <div class="baby">Testing</div>
</body>

</html>
