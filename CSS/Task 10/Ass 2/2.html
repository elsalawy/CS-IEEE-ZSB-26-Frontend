<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Selectors 2</title>
    <style>
        .parent .child:nth-child(2) {
            color: red;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="child">Testing</div>
        <div class="child">Elzero</div>
    </div>
    <div class="parent">
        <div>
            <div class="child">Testing</div>
        </div>
    </div>
    <div class="child">Testing</div>
</body>

</html>
