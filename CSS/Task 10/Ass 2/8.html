<!DOCTYPE html>
<html>

<head>

    <title>Selectors 8</title>
    <style>
        div>div:nth-child(2),
        div>div:nth-child(3),
        div>p:nth-child(5) {
            color: red;
        }

</head>

<body>
    <div>
        <div>Testing</div>
        <div>Elzero</div>
        <div>Elzero</div>

        <h3>Testing</h3>
        <div>Testing</div>
    </div>
</body>

</html>
