<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        div {
            width: 600px;
            height: 100px;
            background-color: #EEE;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
            letter-spacing: 7px;
            font-size: 40px;

            border: 8px solid;
            border-image: linear-gradient(to right,
                    red 0% 20%,
                    dodgerblue 20% 40%,
                    green 40% 60%,
                    deeppink 60% 80%,
                    purple 80% 100%) 1;
        }

        div::first-letter {
            color: red;
        }
    </style>
</head>

<body>
    <div>Elzero</div>
</body>

</html>
