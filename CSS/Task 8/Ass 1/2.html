<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Form</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .field {
            width: 600px;
            background-color: #EEE;
            padding: 20px;
            margin: 10px 0;
            position: relative;
        }

        .field::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, #f44336 50%, #009688 50%);
        }

        input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 20px;
            caret-color: red;
        }
    </style>

</head>

<body>

    <div class="field">
        <input type="text" placeholder="One">
    </div>

    <div class="field">
        <input type="text" placeholder="Two">
    </div>

    <div class="field">
        <input type="text" placeholder="Three">
    </div>

</body>

</html>
