<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport">
    <title>Grid Layout</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }

        .layout {
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(4, auto);
            grid-template-rows: 60px 1fr 60px;
            grid-template-areas:
                "header header header header"
                "section section section aside"
                "footer footer footer footer";
        }

        header {
            grid-area: header;
            background-color: #03A9F4;
            color: white;
            padding: 15px;
        }

        section {
            grid-area: section;
            background-color: #FF5722;
            color: white;
            padding: 15px;
        }

        aside {
            grid-area: aside;
            background-color: #607D8B;
            color: white;
            padding: 15px;
        }

        footer {
            grid-area: footer;
            background-color: #009688;
            color: white;
            padding: 15px;
        }

        header::before {
            content: "Header";
        }

        section::before {
            content: "Section";
        }

        aside::before {
            content: "Aside";
        }

        footer::before {
            content: "Footer";
        }
    </style>
</head>

<body>

    <div class="layout">
        <header></header>
        <section></section>
        <aside></aside>
        <footer></footer>
    </div>

</body>

</html>
