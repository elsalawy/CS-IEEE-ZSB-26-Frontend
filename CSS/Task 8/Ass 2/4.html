<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Position</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .grid {
            background-color: #ddd;
            padding: 20px;
            width: 800px;
            height: 400px;
            display: grid;
            gap: 15px;
            grid-template-columns: repeat(3, auto);
            grid-template-rows: repeat(6, auto);

            grid-template-areas:
                "eight eight eight"
                "two   two   three"
                "four  five  five"
                "six   five  five"
                "seven five  five"
                "one   one   one";
        }

        .grid div {
            background-color: #2196F3;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
        }

        .one {
            grid-area: one;
        }

        .two {
            grid-area: two;
        }

        .three {
            grid-area: three;
        }

        .four {
            grid-area: four;
        }

        .five {
            grid-area: five;
        }

        .six {
            grid-area: six;
        }

        .seven {
            grid-area: seven;
        }

        .eight {
            grid-area: eight;
        }
    </style>
</head>

<body>
    <div class="grid">
        <div class="eight">8</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
        <div class="six">6</div>
        <div class="seven">7</div>
        <div class="five">5</div>
        <div class="one">1</div>
    </div>
</body>

</html>
