<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Transition</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        div {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #EEE;
            justify-content: center;
            display: flex;
            align-items: center;
            font-size: xx-large;
            font-weight: bold;
            position: relative;
        }

        div::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid;
            border-color: transparent rgb(202, 44, 131) rgb(202, 44, 131) rgb(202, 44, 131);
            transform: rotate(-90deg);
            transition: 1s ease;
        }

        div::after {
            content: "";
            position: absolute;
            width: 110%;
            height: 110%;
            border-radius: 50%;
            border: 10px solid;
            border-color: transparent #2196f3 #2196f3 #2196f3;
            transform: rotate(90deg);
            transition: 1s 1s ease;
        }


        div:hover::before {
            transform: rotate(270deg);
        }

        div:hover::after {
            transform: rotate(450deg);
        }
    </style>
</head>

<body>
    <div>
        ELsalawy
    </div>

</body>

</html>
