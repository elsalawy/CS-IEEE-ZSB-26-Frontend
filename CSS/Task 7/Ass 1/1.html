<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Transition</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .parent {
            width: 400px;
            height: 240px;
            background-color: #e2dede;
            text-align: center;
            padding-top: 40px;
            transition: margin-bottom .5s ease;
        }

        .child {
            width: 350px;
            height: 60px;
            align-content: center;
            background-color: #b4afaf;
            margin-left: 25px;
            margin-top: var(--childMargin);
            transition: margin-top .5s .5s ease;
        }

        .parent:hover {
            margin-bottom: 80px;
            --childMargin: 70px;
        }

        :root {
            --childMargin: 20px;
        }
    </style>
</head>

<body>
    <div class="parent">
        Will Go Up On Hover in Half Second
        <div class="child">
            Will Go Down After Half Second
        </div>
    </div>
</body>

</html>
