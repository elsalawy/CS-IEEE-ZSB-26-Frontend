<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Position</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        div {
            width: 400px !important;
            background-color: #EEE !important;
            color: transparent !important;
            border: none !important;
            font-size: 20px !important;
            position: relative;
        }

        div::after {
            content: "Elzero";
            color: black;
            font-weight: bold;
            text-align: center;
            font-size: 20px;
            width: 400px;
            position: absolute;
            left: 0;
        }
    </style>
</head>

<body>
    <div style="
  background-color: red;
  color: white;
  padding: 20px;
  border: 1px solid blue;
  font-size: 80px;">
        Hello Div
    </div>



</body>

</html>
