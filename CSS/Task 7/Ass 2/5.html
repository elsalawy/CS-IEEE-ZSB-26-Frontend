<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Position</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .parent {
            background-color: #EEE;
            width: 600px;
            height: 300px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .parent div {
            width: 100px;
            height: 50%;
            align-content: center;
            text-align: center;
            color: white;

        }

        .one {
            background-color: orange;
            order: 2;
        }

        .two {
            background-color: greenyellow;
            align-self: self-end;
            order: 3;
        }

        .three {
            background-color: brown;
            order: 4;
        }

        .four {
            background-color: purple;
            order: 1;
            align-self: self-end;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
    </div>
</body>

</html>
