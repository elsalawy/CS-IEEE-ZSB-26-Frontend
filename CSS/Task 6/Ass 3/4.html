<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Pesudo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        p {
            background-color: #EEE;
            width: 400px;
            height: 50px;
            display: flex;
            padding-left: 20px;
            align-items: center;
            margin: 5px;
            position: relative;
            counter-increment: counter;
        }

        p::after {
            content: "";
            position: absolute;
            width: 5px;
            height: 100%;
            right: 0;
            top: 0;
            background-color: #ce3636;
        }

        p::before {
            content: counter(counter);
            background-color: #ce3636;
            color: white;
            font-weight: bold;
            position: absolute;
            left: -50px;
            width: 50px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <p>This Is Very Very Long Product Title</p>
    <p>This Is Very Very Long Product Title</p>
    <p>This Is Very Very Long Product Title</p>
    <p>This Is Very Very Long Product Title</p>
    <p>This Is Very Very Long Product Title</p>
    <p>This Is Very Very Long Product Title</p>
</body>

</html>
