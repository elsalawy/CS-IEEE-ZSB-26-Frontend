<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Position</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        p {
            position: relative;
            background-color: #EEE;
            display: block;
            width: 400px;
            height: 50px;
            align-content: center;
            margin: 10px;
            padding-left: 10px;

        }

        p::before {
            content: attr(data-person);
            width: 80px;
            height: 20px;
            position: absolute;
            left: -130px;
            background-color: #EEE;
            padding: 10px;
            font-weight: bold;
            margin-top: -10px;
            text-align: center;
        }

        p::after {
            content: "";
            width: 5px;
            height: 100%;
            position: absolute;
            left: -5px;
            top: 0;
            background-color: rgb(211, 57, 134);
        }

        p span {
            content: "";
            position: absolute;
            top: 50%;
            left: -25px;
            width: 0;
            height: 0;
            margin-top: -8px;
            border-style: solid;
            border-width: 10px;
            border-color: transparent rgb(211, 57, 134) transparent transparent;
        }
    </style>
</head>

<body>
    <p data-person="Hussein"><span class="p"></span> Is Very Very Long Comment Number One</p>
    <p data-person="Salama"><span class="p"></span>This Is Very Very Long Comment Number Two</p>
    <p data-person="Elsalawy"><span class="p"></span>Is Very Very Long Comment Number Three</p>

</body>

</html>
