<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Position</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .parent {
            width: 480px;
            padding: 25px;
            background-color: #eee;
            border: 3px solid;
            border-color: red blue;
            position: relative;
            text-align: center;
            line-height: 1.8;
            font-size: 18px;
        }

        .corner {
            position: absolute;
            border: 2px solid #2d2de0;
            width: 40px;
            height: 25px;
            background: #2d2de0;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;

        }

        .top-left {
            border-right-color: red;
            top: -12px;
            left: -20px
        }

        .bottom-left {

            border-right-color: red;
            bottom: -12px;
            left: -20px
        }

        .top-right {
            border-left-color: red;
            top: -12px;
            right: -20px;
        }

        .bottom-right {
            border-left-color: red;
            bottom: -12px;
            right: -20px;
        }
    </style>
</head>

<body>

    <div class="parent">
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Quod, sed. Ea ipsum
        similique quasi rem, fugiat voluptatibus reiciendis nam debitis earum quo veniam
        laudantium mollitia atque! Laborum ea nam doloribus.

        <span class="corner top-left">1</span>
        <span class="corner bottom-left">2</span>
        <span class="corner top-right">3</span>
        <span class="corner bottom-right">4</span>
    </div>

</body>

</html>
