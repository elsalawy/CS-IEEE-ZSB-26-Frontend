<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="Description" content="se7s" />
    <title>Position</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            position: absolute;
        }

        .green {
            background-color: rgb(22, 207, 161);
            left: 30px;
            top: 30px;
            z-index: 3;
        }

        .red {
            background-color: rgb(244, 67, 54);
            left: 40px;
            top: 40px;
            z-index: 4;

        }

        .blue {
            background-color: rgb(33, 150, 243);
            left: 20px;
            top: 20px;
            z-index: 2;
        }

        .black {
            background-color: rgb(36, 30, 30);
            left: 20px;
            top: 30px;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="green"></div>
    <div class="red"></div>
    <div class="blue"></div>
    <div class="black"></div>
</body>

</html>
