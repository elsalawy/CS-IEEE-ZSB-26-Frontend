<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Position</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;

        }

        div {
            width: 100px;
            height: 100px;
            background-color: #e6e3e3;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px;
            border-radius: 50%;
            font-weight: lighter;
            counter-increment: count;
            position: relative;
            box-shadow: 5px 5px dodgerblue, -5px -5px crimson;
        }

        div::before {
            content: counter(count);
            background-color: black;
            width: 20px;
            height: 20px;
            color: white;
            position: absolute;
            top: -10px;
            left: 40px;
            text-align: center;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div>Element</div>
    <div>Element</div>
    <div>Element</div>

</body>

</html>
