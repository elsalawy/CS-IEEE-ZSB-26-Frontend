<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Grid Layout</title>
    <style>
        body {
            margin: 10px;
            background-color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .parent {
            background-color: rgb(239, 242, 245);
            width: 700px;
            padding: 20px;
            display: grid;
            gap: 20px;
        }

        .one div,
        .two div,
        .three div,
        .full {
            padding: 15px;
            text-align: center;
            background-color: #e2dede;
            font-weight: bold;
        }

        .one {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .two {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .three {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
    </style>
</head>

<body>
    <div class="parent">

        <div class="full">Full Width</div>

        <div class="one">
            <div>1/3</div>
            <div>1/3</div>
            <div>1/3</div>
        </div>

        <div class="two">
            <div>1/2</div>
            <div>1/2</div>
        </div>

        <div class="three">
            <div>1/4</div>
            <div>1/4</div>
            <div>1/4</div>
            <div>1/4</div>
        </div>
    </div>
</body>

</html
